<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Drift Championship 2D — Multiplayer Racing</title>
    <meta name="description" content="2D racing game with drift, online and local multiplayer. Up to 4 players in epic drift battles!">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    

    <!-- HUD (built dynamically by JS) -->
    <div id="hud"></div>

    <!-- Canvas + Menu Container -->
    <div id="canvasContainer">
        <div id="menu">
            <div class="menu-title">ULTIMATE DRIFT 2D</div>
            <div class="menu-subtitle">CHAMPIONSHIP</div>

            <div class="controls-info">
                <strong>Anti-Ghosting Controls:</strong><br>
                P1: Arrow Keys + <b>SHIFT</b> (Nitro)<br>
                P2: Keys <b>T / F / G / H</b> + <b>Q</b> (Nitro)
            </div>

            <!-- ======== MAIN MENU ======== -->
            <div id="main-menu" class="submenu" style="display: flex;">
                <button class="btn btn-success" id="btn-solo">🏎️ SOLO vs BOTS</button>
                <button class="btn btn-danger" id="btn-local">👥 LOCAL MODE (2P)</button>
                <button class="btn btn-purple" id="btn-online">🌐 ONLINE (ROOMS)</button>
            </div>

            <!-- ======== SOLO SETUP ======== -->
            <div id="solo-setup" class="submenu">
                <div class="section-title">SOLO SETUP</div>
                <div class="setup-row">
                    <label>Number of Bots:</label>
                    <select id="solo-bots">
                        <option value="1">1 Bot</option>
                        <option value="2">2 Bots</option>
                        <option value="3">3 Bots</option>
                    </select>
                </div>
                <div class="setup-row">
                    <label>Difficulty:</label>
                    <select id="solo-diff">
                        <option value="facil">🟢 Easy</option>
                        <option value="medio" selected>🟠 Medium</option>
                        <option value="dificil">🔴 Hard</option>
                    </select>
                </div>
                <button class="btn" id="btn-solo-next">CHOOSE TRACK →</button>
                <button class="btn btn-secondary btn-small" id="btn-solo-back">← BACK</button>
            </div>

            <!-- ======== LOCAL SETUP ======== -->
            <div id="local-setup" class="submenu">
                <div class="section-title">LOCAL MODE — 2 PLAYERS</div>
                <div class="setup-row">
                    <label>Extra Bots:</label>
                    <select id="local-bots">
                        <option value="0" selected>None</option>
                        <option value="1">1 Bot</option>
                        <option value="2">2 Bots</option>
                    </select>
                </div>
                <div class="setup-row">
                    <label>Difficulty:</label>
                    <select id="local-diff">
                        <option value="facil">🟢 Easy</option>
                        <option value="medio" selected>🟠 Medium</option>
                        <option value="dificil">🔴 Hard</option>
                    </select>
                </div>
                <button class="btn" id="btn-local-next">CHOOSE TRACK →</button>
                <button class="btn btn-secondary btn-small" id="btn-local-back">← BACK</button>
            </div>

            <!-- ======== ONLINE MENU ======== -->
            <div id="online-menu" class="submenu">
                <div class="section-title">ONLINE MODE</div>
                <input class="input-field" id="input-create-name" placeholder="Your name" maxlength="12" value="">
                <button class="btn btn-success" id="btn-create">🏠 CREATE ROOM</button>
                <button class="btn" id="btn-join-go">🔗 JOIN ROOM</button>
                <button class="btn btn-secondary btn-small" id="btn-online-back">← BACK</button>
            </div>

            <!-- ======== JOIN ROOM ======== -->
            <div id="join-room" class="submenu">
                <div class="section-title">JOIN ROOM</div>
                <input class="input-field" id="input-join-name" placeholder="Your name" maxlength="12">
                <input class="input-field input-code" id="input-room-code" placeholder="ABCD" maxlength="4">
                <button class="btn btn-success" id="btn-join-confirm">JOIN</button>
                <button class="btn btn-secondary btn-small" id="btn-join-back">← BACK</button>
            </div>

            <!-- ======== LOBBY ======== -->
            <div id="lobby" class="submenu">
                <div class="section-title">ROOM</div>
                <div class="room-code-display" id="display-room-code">----</div>
                <div id="lobby-player-list"></div>

                <!-- Host-only controls -->
                <div id="lobby-host-controls" class="lobby-host-controls" style="display:none;">
                    <div class="setup-row">
                        <label>Track:</label>
                        <select id="lobby-track"></select>
                    </div>
                    <div class="setup-row">
                        <label>Bots:</label>
                        <select id="lobby-bots">
                            <option value="0" selected>None</option>
                            <option value="1">1 Bot</option>
                            <option value="2">2 Bots</option>
                            <option value="3">3 Bots</option>
                        </select>
                    </div>
                    <div class="setup-row">
                        <label>Difficulty:</label>
                        <select id="lobby-diff">
                            <option value="facil">Easy</option>
                            <option value="medio" selected>Medium</option>
                            <option value="dificil">Hard</option>
                        </select>
                    </div>
                </div>

                <button class="btn btn-success" id="btn-lobby-start" style="display:none;">🏁 START RACE</button>
                <div class="lobby-info">Waiting for host to start the race...</div>
                <button class="btn btn-secondary btn-small" id="btn-lobby-leave">LEAVE ROOM</button>
            </div>

            <!-- ======== TRACK SELECTION ======== -->
            <div id="track-menu" class="submenu">
                <div class="section-title">CHOOSE TRACK</div>
                <div id="track-grid"></div>
                <button class="btn btn-secondary btn-small" id="btn-track-back">← BACK</button>
            </div>
        </div>

        <canvas id="gameCanvas" width="1400" height="850"></canvas>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container"></div>

    <!-- Game Scripts (ES Modules) -->
    <script type="module" src="/js/game.js"></script>

</body>
</html>
