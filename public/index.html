<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Drift Championship 2D — Multiplayer Racing</title>
    <meta name="description" content="Jogo de corrida 2D com drift, multiplayer online e local. Até 4 jogadores em batalhas épicas de drift!">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <!-- HUD (built dynamically by JS) -->
    <div id="hud"></div>

    <!-- Canvas + Menu Container -->
    <div id="canvasContainer">
        <div id="menu">
            <div class="menu-title">ULTIMATE DRIFT 2D</div>
            <div class="menu-subtitle">CHAMPIONSHIP</div>

            <div class="controls-info">
                <strong>Controles Anti-Ghosting:</strong><br>
                P1: Setas Direcionais + <b>SHIFT</b> (Nitro)<br>
                P2: Teclas <b>T / F / G / H</b> + <b>Q</b> (Nitro)
            </div>

            <!-- ======== MAIN MENU ======== -->
            <div id="main-menu" class="submenu" style="display: flex;">
                <button class="btn btn-success" id="btn-solo">🏎️ SOLO vs BOTS</button>
                <button class="btn btn-danger" id="btn-local">👥 MODO LOCAL (2P)</button>
                <button class="btn btn-purple" id="btn-online">🌐 ONLINE (SALAS)</button>
            </div>

            <!-- ======== SOLO SETUP ======== -->
            <div id="solo-setup" class="submenu">
                <div class="section-title">CONFIGURAÇÃO SOLO</div>
                <div class="setup-row">
                    <label>Número de Bots:</label>
                    <select id="solo-bots">
                        <option value="1">1 Bot</option>
                        <option value="2">2 Bots</option>
                        <option value="3">3 Bots</option>
                    </select>
                </div>
                <div class="setup-row">
                    <label>Dificuldade:</label>
                    <select id="solo-diff">
                        <option value="facil">🟢 Fácil</option>
                        <option value="medio" selected>🟠 Médio</option>
                        <option value="dificil">🔴 Difícil</option>
                    </select>
                </div>
                <button class="btn" id="btn-solo-next">ESCOLHER PISTA →</button>
                <button class="btn btn-secondary btn-small" id="btn-solo-back">← VOLTAR</button>
            </div>

            <!-- ======== LOCAL SETUP ======== -->
            <div id="local-setup" class="submenu">
                <div class="section-title">MODO LOCAL — 2 JOGADORES</div>
                <div class="setup-row">
                    <label>Bots extras:</label>
                    <select id="local-bots">
                        <option value="0" selected>Nenhum</option>
                        <option value="1">1 Bot</option>
                        <option value="2">2 Bots</option>
                    </select>
                </div>
                <div class="setup-row">
                    <label>Dificuldade:</label>
                    <select id="local-diff">
                        <option value="facil">🟢 Fácil</option>
                        <option value="medio" selected>🟠 Médio</option>
                        <option value="dificil">🔴 Difícil</option>
                    </select>
                </div>
                <button class="btn" id="btn-local-next">ESCOLHER PISTA →</button>
                <button class="btn btn-secondary btn-small" id="btn-local-back">← VOLTAR</button>
            </div>

            <!-- ======== ONLINE MENU ======== -->
            <div id="online-menu" class="submenu">
                <div class="section-title">MODO ONLINE</div>
                <input class="input-field" id="input-create-name" placeholder="Seu nome" maxlength="12" value="">
                <button class="btn btn-success" id="btn-create">🏠 CRIAR SALA</button>
                <button class="btn" id="btn-join-go">🔗 ENTRAR EM SALA</button>
                <button class="btn btn-secondary btn-small" id="btn-online-back">← VOLTAR</button>
            </div>

            <!-- ======== JOIN ROOM ======== -->
            <div id="join-room" class="submenu">
                <div class="section-title">ENTRAR EM SALA</div>
                <input class="input-field" id="input-join-name" placeholder="Seu nome" maxlength="12">
                <input class="input-field input-code" id="input-room-code" placeholder="ABCD" maxlength="4">
                <button class="btn btn-success" id="btn-join-confirm">ENTRAR</button>
                <button class="btn btn-secondary btn-small" id="btn-join-back">← VOLTAR</button>
            </div>

            <!-- ======== LOBBY ======== -->
            <div id="lobby" class="submenu">
                <div class="section-title">SALA</div>
                <div class="room-code-display" id="display-room-code">----</div>
                <div id="lobby-player-list"></div>

                <!-- Host-only controls -->
                <div id="lobby-host-controls" class="lobby-host-controls" style="display:none;">
                    <div class="setup-row">
                        <label>Pista:</label>
                        <select id="lobby-track"></select>
                    </div>
                    <div class="setup-row">
                        <label>Bots:</label>
                        <select id="lobby-bots">
                            <option value="0" selected>Nenhum</option>
                            <option value="1">1 Bot</option>
                            <option value="2">2 Bots</option>
                            <option value="3">3 Bots</option>
                        </select>
                    </div>
                    <div class="setup-row">
                        <label>Dificuldade:</label>
                        <select id="lobby-diff">
                            <option value="facil">Fácil</option>
                            <option value="medio" selected>Médio</option>
                            <option value="dificil">Difícil</option>
                        </select>
                    </div>
                </div>

                <button class="btn btn-success" id="btn-lobby-start" style="display:none;">🏁 INICIAR CORRIDA</button>
                <div class="lobby-info">Aguardando host iniciar a corrida...</div>
                <button class="btn btn-secondary btn-small" id="btn-lobby-leave">SAIR DA SALA</button>
            </div>

            <!-- ======== TRACK SELECTION ======== -->
            <div id="track-menu" class="submenu">
                <div class="section-title">ESCOLHA A PISTA</div>
                <div id="track-grid"></div>
                <button class="btn btn-secondary btn-small" id="btn-track-back">← VOLTAR</button>
            </div>
        </div>

        <canvas id="gameCanvas" width="1400" height="850"></canvas>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container"></div>

    <!-- Game Scripts (ES Modules) -->
    <script type="module" src="/js/game.js"></script>

</body>
</html>
